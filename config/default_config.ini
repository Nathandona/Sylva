[Window]
width = 1280
height = 720
title = "Sylva Engine"
fullscreen = false

[Graphics]
vsync = true
msaa = 4
shadow_quality = high

[Input]
mouse_sensitivity = 0.5
invert_y = false

[Logging]
level = INFO
file = "logs/engine.log"

[Audio]
master_volume = 0.8
sound_effect_volume = 1.0
music_volume = 0.7
ambient_volume = 0.5
voice_volume = 1.0

[AudioAssets]
; PCM WAV only. OGG/MP3 will be skipped with a warning until a decoder is added.
startup_sfx  = "assets/audio/sfx/startup.wav"
footstep_sfx = "assets/audio/sfx/footstep.wav"
music_track  = "assets/audio/music/background.ogg"

[Camera]
orbit_distance = 5.0
min_distance = 2.0
max_distance = 10.0
target_height = 1.7
rotation_speed = 1.0
zoom_speed = 0.3
; Higher = snappier camera follow; lower = floatier. Time-constant in 1/s.
follow_smoothing = 12.0

[Player]
move_speed = 5.0
; Radians/sec — how fast the player visually turns toward movement direction.
; 15 rad/s gives ~860 deg/s; a 180-degree about-face takes ~0.2s.
rotation_speed = 15.0
collision_radius = 0.5
height = 1.8
width = 1.0
depth = 1.0
; Maximum vertical step the player auto-climbs without jumping. 0.30 world-y
; at default cell_size=0.25 covers a single voxel (and a bit). Set to 0 to
; disable auto-step (jumping required for every obstacle).
auto_step_height = 0.30

[World]
terrain_size = 100
cell_size = 0.25
max_height = 10.0
seed = 0
; Initial world horizontal radius around the player, in chunks. A value of N
; spawns (2N+1)^2 chunks per Y layer. Keep small — generation is single-
; threaded and blocking right now (~2-5 ms per chunk on a modern CPU).
size_in_chunks = 3
view_distance = 3
; Vertical chunk range. Terrain currently fits inside one chunk Y (max_height
; * cell_size = 2.5 world-y, well under CHUNK_SIZE * cell_size = 8).
chunk_y_min = 0
chunk_y_max = 0

[UI]
crosshair_size = 20.0
crosshair_thickness = 2.0 
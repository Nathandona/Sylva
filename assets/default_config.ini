# Sylva Engine Default Configuration

# Display settings
windowWidth = 1920
windowHeight = 1080
windowTitle = Sylva
fullscreen = false
vsync = true

# Asset paths
assetPath = assets
shaderPath = shaders
texturePath = textures
modelPath = models

# Input settings
mouseSensitivity = 0.1
invertY = false

# Graphics settings
shadowsEnabled = true
shadowResolution = 1024
msaaSamples = 4
anisotropicFiltering = 4

# Logging settings
logLevel = INFO
logToFile = false
logFilename = sylva.log

# Debug settings
showFPS = true
showDebugInfo = false 